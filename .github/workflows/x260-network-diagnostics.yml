name: Diagnose x260 network

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: [self-hosted, x260, linux]
    steps:
      - name: Test outbound network from application container
        run: |
          docker exec -i tt-tournament node --input-type=module - <<'NODE'
          import https from "node:https";

          const targets = [
            "https://api.telegram.org",
            "https://api.openai.com/v1/models",
          ];

          for (const target of targets) {
            try {
              const response = await fetch(target, {
                signal: AbortSignal.timeout(10_000),
              });
              console.log(target, "fetch", response.status);
            } catch (error) {
              console.error(target, "fetch failed", error, error.cause);
            }

            await new Promise((resolve) => {
              const request = https.get(
                target,
                { family: 4, timeout: 10_000 },
                (response) => {
                  console.log(target, "https IPv4", response.statusCode);
                  response.resume();
                  resolve();
                }
              );
              request.on("timeout", () => request.destroy(new Error("timeout")));
              request.on("error", (error) => {
                console.error(target, "https IPv4 failed", error);
                resolve();
              });
            });
          }
          NODE
