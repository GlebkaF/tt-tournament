# Push to main → deploy on x260 (self-hosted runner). Runs in parallel with Vercel.

name: Deploy to x260

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, x260, linux]
    if: github.repository == 'GlebkaF/tt-tournament'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Telegram proxy from pesiki-bot
        run: |
          proxy_url=$(docker inspect pesiki-bot \
            --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | sed -n 's/^HTTPS_PROXY=//p' \
            | head -n 1)
          if [ -z "$proxy_url" ]; then
            echo "HTTPS_PROXY is not configured in pesiki-bot"
            exit 1
          fi
          echo "::add-mask::$proxy_url"
          echo "HTTPS_PROXY=$proxy_url" >> "$GITHUB_ENV"

      - name: Start database and apply admin schema
        run: |
          docker compose up -d postgres
          for attempt in $(seq 1 30); do
            if docker exec tt-tournament-postgres pg_isready -U tt -d tt; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "PostgreSQL did not become ready"
              exit 1
            fi
            sleep 1
          done
          for migration in \
            prisma/migrations/20260718000000_add_tournament_participants_and_user_image/migration.sql \
            prisma/migrations/20260718010000_add_active_tournament_participant/migration.sql \
            prisma/migrations/20260719000000_add_daily_digest/migration.sql
          do
            docker exec -i tt-tournament-postgres psql -U tt -d tt -v ON_ERROR_STOP=1 \
              < "$migration"
          done
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          DIGEST_CRON_SECRET: ${{ secrets.DIGEST_CRON_SECRET }}

      - name: Build and run application
        run: docker compose up -d --build --force-recreate --no-deps tt-tournament digest-scheduler telegram-bot-poller
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          DIGEST_CRON_SECRET: ${{ secrets.DIGEST_CRON_SECRET }}

      - name: Verify application, scheduler, and digest dry run
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --output /dev/null http://localhost:3010/; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Application did not become ready"
              docker logs tt-tournament --tail 100
              exit 1
            fi
            sleep 2
          done

          test "$(docker inspect --format '{{.State.Running}}' tt-tournament-digest-scheduler)" = "true"
          test "$(docker inspect --format '{{.State.Running}}' tt-tournament-telegram-bot-poller)" = "true"
          telegram_probe=$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${DIGEST_CRON_SECRET}" \
            "http://localhost:3010/api/cron/daily-digest?probe=1")
          echo "$telegram_probe" | grep --quiet '"status":"ready"'
          for attempt in $(seq 1 60); do
            if docker logs --since 60s tt-tournament-telegram-bot-poller 2>&1 \
              | grep --quiet '"status":"ready"'; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "Telegram long polling did not become ready"
              docker logs tt-tournament-telegram-bot-poller --tail 50
              docker logs tt-tournament --tail 100
              exit 1
            fi
            sleep 1
          done
          digest_response=$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${DIGEST_CRON_SECRET}" \
            "http://localhost:3010/api/cron/daily-digest?dryRun=1&date=2026-07-14")
          echo "$digest_response" | grep --quiet '"status":"dry_run"'
        env:
          DIGEST_CRON_SECRET: ${{ secrets.DIGEST_CRON_SECRET }}
