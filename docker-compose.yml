# Deploy: docker compose up -d --build --force-recreate
# Env: GitHub Actions workflow passes secrets directly into this compose file
# Postgres init dump lives at /opt/tt-tournament-data/init on the host
# (loaded by postgres image only when the data volume is empty).

services:
  postgres:
    image: postgres:16-alpine
    container_name: tt-tournament-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tt
      POSTGRES_USER: tt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tt_pg_data:/var/lib/postgresql/data
      - /opt/tt-tournament-data/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tt -d tt"]
      interval: 5s
      timeout: 3s
      retries: 20

  tt-tournament:
    build: .
    image: tt-tournament
    container_name: tt-tournament
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3010:3000"
    environment:
      - TZ=Europe/Moscow
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - BASIC_AUTH_USERNAME=${BASIC_AUTH_USERNAME}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EDITOR_MODEL=${OPENAI_EDITOR_MODEL:-gpt-5.4-mini}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
      - TELEGRAM_THREAD_ID=${TELEGRAM_THREAD_ID}
      - DIGEST_CRON_SECRET=${DIGEST_CRON_SECRET}

  digest-scheduler:
    image: alpine:3.20
    container_name: tt-tournament-digest-scheduler
    restart: unless-stopped
    depends_on:
      tt-tournament:
        condition: service_started
    environment:
      - DIGEST_CRON_SECRET=${DIGEST_CRON_SECRET}
    command:
      - /bin/sh
      - -ec
      - |
        echo "0,5,10 15 * * * wget -qO- --header='Authorization: Bearer $${DIGEST_CRON_SECRET}' http://tt-tournament:3000/api/cron/daily-digest >> /proc/1/fd/1 2>> /proc/1/fd/2" > /etc/crontabs/root
        exec crond -f -l 2

  telegram-bot-poller:
    image: alpine:3.20
    container_name: tt-tournament-telegram-bot-poller
    restart: unless-stopped
    depends_on:
      tt-tournament:
        condition: service_started
    environment:
      - DIGEST_CRON_SECRET=${DIGEST_CRON_SECRET}
    command:
      - /bin/sh
      - -ec
      - |
        while true; do
          wget -qO- -T 40 --header="Authorization: Bearer $${DIGEST_CRON_SECRET}" http://tt-tournament:3000/api/telegram/poll || true
          echo
          sleep 1
        done

volumes:
  tt_pg_data:
